[platformio]
; 源码根目录就是当前仓库根目录，各环境再用 build_src_filter 选择自己的子目录。
src_dir = .

; 默认编译 1 号车 ESP 主站。VSCode/PlatformIO 侧边栏里仍可手动选择其他环境。
default_envs = esp_master

[env:esp_base]
; ESP8266 通用配置，esp_master 和 esp_slave 都继承这里。
platform = espressif8266
framework = arduino
board = nodemcuv2
upload_speed = 115200
build_flags =
  -Wall
  -Wextra

[env:esp_master]
; 1 号车 ESP：开 WiFi 热点和 TCP 服务端，接手机和 2 号车。
extends = env:esp_base
build_src_filter =
  +<esp_master/>

[env:esp_slave]
; 2 号车 ESP：连接 1 号车热点，并把主站命令转给本车 51。
extends = env:esp_base
build_src_filter =
  +<esp_slave/>

[env:mcu_base]
; 51 单片机通用配置，当前按 STC89C52RC + 11.0592MHz 晶振设置。
platform = intel_mcs51
board = STC89C52RC
board_build.f_cpu = 11059200L
; 让 mcu_car_a / mcu_car_b 可以直接 include 公共头文件。
build_flags =
  -Imcu_common

[env:mcu_car_a]
; 1 号车 51 正式程序。
extends = env:mcu_base
build_flags =
  ${env:mcu_base.build_flags}
  -Imcu_car_a
build_src_filter =
  +<mcu_car_a/>

[env:mcu_car_b]
; 2 号车 51 正式程序。
extends = env:mcu_base
build_flags =
  ${env:mcu_base.build_flags}
  -Imcu_car_b
build_src_filter =
  +<mcu_car_b/>

[env:mcu_car_a_motor_test]
; 用 1 号车引脚配置编译电机正反转测试程序。
extends = env:mcu_base
build_flags =
  ${env:mcu_base.build_flags}
  -Imcu_car_a
build_src_filter =
  +<mcu_motor_test/>

[env:mcu_car_b_motor_test]
; 用 2 号车引脚配置编译电机正反转测试程序。
extends = env:mcu_base
build_flags =
  ${env:mcu_base.build_flags}
  -Imcu_car_b
build_src_filter =
  +<mcu_motor_test/>

[env:mcu_car_a_uart_rx_test]
; 用 1 号车引脚配置编译串口接收测试程序。
extends = env:mcu_base
build_flags =
  ${env:mcu_base.build_flags}
  -Imcu_car_a
build_src_filter =
  +<mcu_uart_rx_test/>

[env:mcu_car_b_uart_rx_test]
; 用 2 号车引脚配置编译串口接收测试程序。
extends = env:mcu_base
build_flags =
  ${env:mcu_base.build_flags}
  -Imcu_car_b
build_src_filter =
  +<mcu_uart_rx_test/>
